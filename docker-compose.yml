version: '3.8'

# ==============================================================================
#  Hermes AI Agent Stack & Collabora Online — docker-compose.yml
#  Includes: Caddy (Proxy) + Hermes Agent + WebUI + Collabora + WOPI + MCP
# ==============================================================================

services:

  # ----------------------------------------------------------------------------
  # Caddy — Modern reverse proxy with automatic SSL and CSP injection
  # ----------------------------------------------------------------------------
  caddy:
    image: caddy:2.7-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - hermes-net
    depends_on:
      - hermes-webui
      - collabora
      - wopi-server

  # ----------------------------------------------------------------------------
  # Hermes Agent — Core AI gateway + OpenAI-compatible API
  # ----------------------------------------------------------------------------
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    tty: true
    stdin_open: true
    environment:
      HERMES_DASHBOARD: "true"
      HERMES_DASHBOARD_HOST: "0.0.0.0"
      HERMES_DASHBOARD_INSECURE: "true"
      HERMES_UID: "10000"
      HERMES_GID: "10000"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ${HERMES_DATA_DIR:-./data}:/opt/data
      - ${WORKSPACE_DIR:-./workspace}:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - hermes-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8642/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ----------------------------------------------------------------------------
  # Hermes Web UI — Browser chat interface
  # ----------------------------------------------------------------------------
  hermes-webui:
    image: ghcr.io/nesquena/hermes-webui:latest
    container_name: hermes-webui
    restart: unless-stopped
    depends_on:
      hermes:
        condition: service_healthy
    environment:
      HERMES_WEBUI_HOST: "0.0.0.0"
      HERMES_WEBUI_PORT: "8787"
      HERMES_AGENT_URL: "http://hermes:8642/v1"
      HERMES_HOME: "/home/hermeswebui/.hermes"
      HERMES_WEBUI_STATE_DIR: "/home/hermeswebui/.hermes/webui"
      HERMES_WEBUI_AGENT_DIR: "/home/hermeswebui/.hermes/hermes-agent"
      WANTED_UID: "10000"
      WANTED_GID: "10000"
      HERMES_WEBUI_EXTENSION_DIR: "/extensions"
      HERMES_WEBUI_EXTENSION_SCRIPT_URLS: "/extensions/collabora-viewer.js"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ${HERMES_DATA_DIR:-./data}:/home/hermeswebui/.hermes
      - ${WORKSPACE_DIR:-./workspace}:/workspace:ro
      - ./hermes-collabora-extension/collabora-viewer.js:/extensions/collabora-viewer.js:ro
    networks:
      - hermes-net

  # ----------------------------------------------------------------------------
  # WOPI Server — Python backend for Collabora filesystem access
  # ----------------------------------------------------------------------------
  wopi-server:
    image: python:3.11-alpine
    container_name: wopi-server
    restart: unless-stopped
    volumes:
      - ${WORKSPACE_DIR:-./workspace}:/workspace
      - ./hermes-collabora-extension/wopi_server.py:/wopi_server.py
    command: python3 /wopi_server.py
    networks:
      - hermes-net

  # ----------------------------------------------------------------------------
  # Collabora CODE — LibreOffice online document editor
  # ----------------------------------------------------------------------------
  collabora:
    image: collabora/code:latest
    container_name: collabora
    restart: unless-stopped
    environment:
      aliasgroups: "host=https://${HERMES_DOMAIN:-hermes.dianinsanlestari.co.id}"
      dictionaries: "en_US id_ID"
      username: "admin"
      password: "${COLLABORA_ADMIN_PASSWORD:-changeme_admin_pass}"
      DONT_GEN_SSL_CERT: "1"
      extra_params: >-
        --o:ssl.enable=false
        --o:ssl.termination=true
        --o:net.frame_ancestors="https://${HERMES_DOMAIN:-hermes.dianinsanlestari.co.id}"
        --o:logging.level=warning
        --o:server_name=${COLLABORA_DOMAIN:-collabora.dianinsanlestari.co.id}
        --o:storage.wopi.host[0]=${HERMES_DOMAIN:-hermes.dianinsanlestari.co.id}
        --o:storage.wopi.alias_groups.mode=first
    cap_add:
      - MKNOD
    networks:
      - hermes-net

  # ----------------------------------------------------------------------------
  # LibreOffice MCP Server — AI agent connector for LibreOffice
  # ----------------------------------------------------------------------------
  libreoffice-mcp:
    build:
      context: ./libreoffice-mcp
    container_name: libreoffice-mcp
    restart: unless-stopped
    shm_size: '2gb'
    environment:
      LIBREOFFICE_OUTPUT_DIR: "/workspace"
    volumes:
      - ${WORKSPACE_DIR:-./workspace}:/workspace
    networks:
      - hermes-net

networks:
  hermes-net:
    name: hermes-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  caddy_data:
  caddy_config:
